name: 部署 VitePress 项目到 GitHub Pages

# 触发条件：推送到 main 分支时执行
on:
  push:
    branches: [master]

# 权限配置（必须，否则无法部署 Pages）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 安装依赖并打包
      - name: 安装依赖 & 构建
        run: |
          npm install
          npm run build

      # 4. 上传构建产物（dist 文件夹）
      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 5. 部署到 GitHub Pages
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
